# VULNERABLE: bundle-size workflow.
#
# Triggered by `pull_request_target`, so it runs in the base repo's trust
# context. Checks out the PR's HEAD (attacker code). Runs `npm install`,
# which runs the attacker's `prepare`/`postinstall` scripts. Caches
# node_modules under a key derived from the lockfile.
#
# Because the attacker's PR does NOT modify the lockfile, the cache key
# is identical to the release workflow's cache key. The poisoned cache
# will be restored by the release workflow on the next push to main.

name: bundle-size (VULNERABLE)

on:
  pull_request_target:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  measure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Restore cached node_modules
        # Shared cache with the release workflow. Cache writes do not honor
        # `permissions: contents: read`.
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        # `npm install` runs the attacker's PR-controlled scripts.
        # In particular, the attacker's modified `prepare` hook runs after
        # deps are installed, planting malicious code into the installed
        # is-number/index.js inside node_modules.
        run: npm install

      - name: Report bundle size
        run: |
          SIZE=$(wc -c < dist/index.js | tr -d ' ')
          echo "bundle size: ${SIZE} bytes"

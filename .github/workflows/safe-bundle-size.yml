# SAFE: bundle-size workflow.
#
# - Trigger is `pull_request`, not `pull_request_target`. Fork PRs run
#   in the fork's trust context — no base secrets, no write GITHUB_TOKEN.
# - Cache key scoped by event name so PR-write and main-write caches
#   never collide.
# - Uses npm ci --ignore-scripts so dependencies' lifecycle hooks do not
#   run during install.

name: bundle-size (SAFE)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  measure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Restore cache (PR-scoped)
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-pr-${{ hashFiles('**/package-lock.json') }}

      - name: Install (no lifecycle scripts)
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Report bundle size
        run: |
          SIZE=$(wc -c < dist/index.js | tr -d ' ')
          echo "bundle size: ${SIZE} bytes"

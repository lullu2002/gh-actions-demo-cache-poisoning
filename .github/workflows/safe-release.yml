# SAFE: release workflow with build/publish split.
#
# Build job: contents:read only, no id-token, runs npm ci --ignore-scripts.
# Publish job: id-token:write, downloads dist/ as artifact, does NOT run
#   npm install or build — only `npm publish`.
#
# Even if a dep is compromised, its code can't reach the publish job.

name: release (SAFE)

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Restore cache (release-scoped)
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-release-${{ hashFiles('**/package-lock.json') }}
      - run: npm ci --ignore-scripts
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with: { name: dist, path: dist/ }

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist/ }
      - run: npm publish --provenance --access public
